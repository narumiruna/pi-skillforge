name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to release, for example v1.2.3
        required: true
        type: string
      release_notes:
        description: Optional release notes. Leave empty to generate notes automatically.
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
          NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
            exit 0
          fi

          if [ -n "$NOTES" ]; then
            gh release create "$TAG" --verify-tag --title "$TAG" --notes "$NOTES"
          else
            gh release create "$TAG" --verify-tag --title "$TAG" --generate-notes
          fi
